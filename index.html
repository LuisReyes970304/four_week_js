<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Four Week</title>
    <link rel="stylesheet" href="asset/css/style.css">
    <link rel="icon" href="type:,">
</head>
<body>
    <main>
        <aside>
            <fieldset class="addProduct">
                <legend>Product</legend>
                <form action="/products" class="productForm">
                    <input type="text" class="productName" placeholder="Add product name">
                    <input type="number" class="productPrice" placeholder="Add product price" step="any">
                    <input type="submit">
                </form>
                <div class="messageAlert"></div>
            </fieldset>
        </aside>
        <figure class="productInformation">
            <h2>Product List</h2>
            <ul class="productList"></ul>
        </figure>
    </main>
    <script type="module" src="app.js"></script>
</body>
</html>
