<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Four Week</title>
    <link rel="stylesheet" href="asset/css/style.css">
</head>
<body>
    <main>
        <fieldset>
            <legend></legend>
            <form action="/products" class="productForm">
                <input type="text" class="productName" placeholder="Add product name">
                <input type="number" class="productPrice" placeholder="Add product price" step="any">
                <input type="number" class="productId" placeholder="Add product id">
                <input type="submit">
            </form>
        </fieldset>
    </main>
    <script type="module" src="app.js"></script>
</body>
</html>
